name: CI

on:
  push:
    branches: [master, main, "feat/**"]
  pull_request:
    branches: [master, main, "feat/**"]

jobs:
  build:
    name: build / ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  # Gate 1: Coverage floor.
  # TODO(m5): raise floor back to 80% as M3/M4 add real logic + tests.
  # M2 threshold = 60% (set 5% below current measured coverage to absorb
  # minor churn) — still a meaningful signal while early crates are shells.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate lcov (artifact)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Generate JSON summary
        # Separate pass: `--lcov --summary-only` does NOT emit a parseable
        # human summary to stdout. Use `report --json` against the existing
        # profile data produced by the previous step.
        run: cargo llvm-cov report --json --summary-only > cov.json
      - name: Enforce >= 60% line coverage
        run: |
          pct=$(jq -r '.data[0].totals.lines.percent' cov.json)
          echo "Line coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 60) ? 0 : 1 }'
      - uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info

  # Gate 2: Rustdoc warnings as errors.
  rustdoc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs (warnings as errors)
        run: cargo doc --workspace --no-deps --all-features

  # Gate 3: MSRV guard (Rust 1.75, matches workspace rust-version).
  msrv:
    name: msrv (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check on MSRV
        run: cargo check --workspace --all-targets

  # Gate 4: Unused dependency detector.
  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bnjbvr/cargo-machete@main

  # Gate 5: Semver breakage detection.
  # Pre-v0.1.0 this crate is unpublished, so cargo-semver-checks cannot
  # fetch a baseline from crates.io and fails with a registry lookup error.
  # Skip on PRs/pushes until we publish; only run on `release` events where
  # a baseline is guaranteed to exist.
  # TODO(v0.1.0): remove the `if:` guard once first release is published.
  semver-checks:
    name: semver-checks
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          release-type: patch

  # Lean4 proof verification — mechanises invariant I1 (no double lock) per
  # `.omne/cfg/concurrency.md` §Lean4 invariant. Linux-only is acceptable
  # per `.omne/cfg/test-plan.md` §Lean4 proof verification — `.olean` is
  # platform-agnostic, so one successful build proves the invariant
  # everywhere. Fails CI if `lake build` emits any error or any `sorry`.
  lean-proof:
    name: Lean4 proof (lake build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean

  # Gate: MCP protocol conformance (L6) — external-oracle gate.
  # Runs `mcp-validator` (Janix-ai) against a release build of `grex serve`
  # at protocol `2025-06-18`. See `docs/ci/mcp-conformance.md` for pin
  # rationale, bypass procedure, and local repro steps.
  #
  # Self-contained job — owns its own `cargo build --release` so `needs:` is
  # deliberately OMITTED (see `openspec/changes/feat-m7-3-mcp-ci-conformance/proposal.md`
  # §Design Notes). A `needs: [build]` dependency would stall on the
  # 3-OS debug matrix (~5 min p95) with zero artefact payoff. Budget:
  # ~3.5 min cold / ~1.5 min warm.
  #
  # Validator pin: `github.com/Janix-ai/mcp-validator@d766d3ee94076b13d0b73253e5221bbc76b9edb2`
  # (tag `v0.3.1`, published 2025-07-08T13:55:45Z). PyPI publication of
  # `mcp-validator==0.3.1` is NOT available (PyPI only lists `0.1.1` as of
  # the 2026-04-22 lookup), so the git+SHA install path is the canonical
  # pin and the only reliable install route. Any bump MUST update the tag
  # AND SHA together — re-run
  # `gh api repos/Janix-ai/mcp-validator/git/refs/tags/v<NEW>` for the new SHA.
  mcp-conformance:
    name: MCP protocol conformance (2025-06-18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct key from the debug `build` job so the release target
          # does not thrash the debug cache.
          key: release
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build release grex (self-contained; ~3 min cold, < 1 min warm)
        run: cargo build --release -p grex
      - name: Install mcp-validator (pinned to SHA d766d3e / tag v0.3.1)
        # Canonical pin is git+SHA (PyPI distribution not published for
        # 0.3.1). Installs the `mcp_testing` package + its deps.
        run: |
          python -m pip install --upgrade pip
          pip install 'git+https://github.com/Janix-ai/mcp-validator@d766d3ee94076b13d0b73253e5221bbc76b9edb2'
      - name: Run conformance suite (protocol 2025-06-18)
        # Invocation mirrors upstream `ref_gh_actions/stdio-validation.yml`
        # at tag v0.3.1: `python -m mcp_testing.stdio.cli "<server-cmd>"
        # --protocol-version <ver> --output-dir reports --timeout <secs>`.
        # Server command is POSITIONAL (not `--server-command`).
        run: |
          mkdir -p reports
          python -m mcp_testing.stdio.cli \
            "$GITHUB_WORKSPACE/target/release/grex serve" \
            --protocol-version 2025-06-18 \
            --output-dir reports \
            --timeout 30
      - name: Upload validator reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-conformance-reports
          path: reports/
          retention-days: 14

  # Housekeeping: cargo-audit (redundant with cargo-deny advisories, kept for standalone signal).
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Ignores are configured in .cargo/audit.toml (mirrors deny.toml).
          # TODO(m5): drop once gitoxide publishes fixes for those advisories.

  # Gates 8 & 9: CBO per module <= 10 and cyclomatic per fn <= 15.
  # Implemented with rust-code-analysis-cli. Gate 10 (cognitive complexity)
  # is enforced by the clippy job via workspace.lints.clippy.cognitive_complexity = "deny".
  code-metrics:
    name: code-metrics (cbo + cyclomatic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rust-code-analysis-cli
        run: cargo install rust-code-analysis-cli --version 0.0.25 --locked || cargo install rust-code-analysis-cli --locked
      - name: Run metrics
        run: |
          mkdir -p metrics-out
          rust-code-analysis-cli --metrics -p crates -O json -o metrics-out
      - name: Enforce CBO <= 10 per module and cyclomatic <= 15 per fn
        run: |
          node - <<'EOF'
          const fs = require('fs'); const path = require('path');
          function walk(d){return fs.readdirSync(d,{withFileTypes:true}).flatMap(e=>{
            const p=path.join(d,e.name);return e.isDirectory()?walk(p):[p];});}
          const files = walk('metrics-out').filter(f=>f.endsWith('.json'));
          const CBO_MAX=10, CYC_MAX=15;
          const violations=[];
          function visit(node, file){
            const m=node.metrics||{};
            const cbo = m.cbo && (m.cbo.cbo ?? m.cbo.coupling);
            if (typeof cbo === 'number' && cbo > CBO_MAX && (node.kind==='unit'||node.kind==='module'))
              violations.push(`CBO ${cbo} > ${CBO_MAX} in ${file}:${node.name}`);
            const cyc = m.cyclomatic && (m.cyclomatic.sum ?? m.cyclomatic.average ?? m.cyclomatic);
            const cycVal = typeof cyc === 'object' ? cyc.sum : cyc;
            if (node.kind==='function' && typeof cycVal === 'number' && cycVal > CYC_MAX)
              violations.push(`Cyclomatic ${cycVal} > ${CYC_MAX} in ${file}:${node.name}`);
            (node.spaces||[]).forEach(s=>visit(s, file));
          }
          for (const f of files){ try { const j=JSON.parse(fs.readFileSync(f,'utf8')); visit(j, f);} catch(e){console.error('parse fail',f,e.message);} }
          if (violations.length){ console.error('Metric violations:\n'+violations.join('\n')); process.exit(1); }
          console.log(`OK: ${files.length} files scanned, no CBO/cyclomatic violations.`);
          EOF
