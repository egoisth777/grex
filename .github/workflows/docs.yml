name: docs

# Build the mdBook site from .omne/cfg/*.md (via docs/build.sh) and deploy to
# GitHub Pages on push to `main` or on tag `v*`. PR runs build-only and
# upload the artefact so reviewers can download-and-preview.
#
# Prereq: Pages source set to "GitHub Actions" in repo settings (M8-3 task 3.6).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: mdbook build
    runs-on: ubuntu-latest
    # Fast PR feedback: cancel superseded build runs on the same ref.
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build book (copies .omne/cfg/*.md into docs/src/)
        run: bash docs/build.sh

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy:
    name: deploy to GitHub Pages
    # Only deploy from main and from v* tags; PR runs build only.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    # Documented GitHub Pages deploy pattern: serialise on the shared `pages`
    # group and never cancel an in-flight deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
