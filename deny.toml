# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# Permissive + weak-copyleft licenses acceptable for MIT-licensed project
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"  # relax for M1; tighten later
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
