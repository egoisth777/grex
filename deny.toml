# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
    # Upstream gitoxide advisories, no fix in gix 0.70.
    # Revisit at M8 release hardening.
    "RUSTSEC-2025-0021",  # SHA-1 collision attacks not detected (gitoxide)
    "RUSTSEC-2025-0140",  # TimeBuf::as_str non-utf8 String (gix-date)
]

[licenses]
version = 2
# Permissive + weak-copyleft licenses acceptable for MIT OR Apache-2.0 project (M7-4c).
# Both MIT and Apache-2.0 are in this allowlist so the workspace's own crates
# satisfy their own gate.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"  # relax for M1; tighten once deps stabilize — see https://github.com/egoisth777/grex/issues/32
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
