# cargo-audit configuration
# https://rustsec.org/advisories/

[advisories]
# Upstream gitoxide advisories, no fix in gix 0.70.
# Revisit at M5 release hardening. Mirrors deny.toml.
ignore = [
    "RUSTSEC-2025-0021",  # SHA-1 collision attacks not detected (gitoxide)
    "RUSTSEC-2025-0140",  # TimeBuf::as_str non-utf8 String (gix)
]
