[book]
title = "grex — declarative meta-repo orchestrator"
authors = ["egoisth777"]
description = "Design-doc mdBook site for the grex CLI / MCP server. Built from .omne/cfg/ sources."
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/egoisth777/grex"
# edit-url-template is intentionally omitted: most docs/src/*.md files are
# generated from .omne/cfg/ at build time, and docs/src/SUMMARY.md plus
# docs/src/introduction.md are authored directly under docs/src/. A single
# template cannot point at both source roots, so we drop the edit link.
site-url = "/grex/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 3

[build]
build-dir = "book"
create-missing = false
